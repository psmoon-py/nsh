version: "3.8"

services:
  acm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acm-nsh2026
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      # Mount logs directory so event logs persist outside the container
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/visualization/snapshot"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
